name: Build Toolchain

on:
  push:
    branches:
      - '**'
    tags:
      - '**'
  pull_request:
    branches:
      - '**'
  schedule:
    - cron: '0 0 * * 0' # Matches the schedule pipeline trigger
  workflow_dispatch:

env:
  BINUTILS_BRANCH: "binutils-2_46-branch"
  GCC_BRANCH: "releases/gcc-15"

jobs:
  build-toolchain:
    name: Build ${{ matrix.arch }} (${{ matrix.target_triple }})
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    timeout-minutes: 360 # 6 hours timeout
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: "arm64"
            target_triple: "aarch64-linux-gnu"
          - arch: "arm"
            target_triple: "arm-linux-gnueabihf"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # Shallow clone

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm base-devel git bison flex texinfo gawk curl tar xz file ncurses python glibc automake autoconf pkgconf gettext rsync zstd cpio kmod bc patch libtool wget gmp mpfr libmpc isl zlib gperf expat openssl
          chmod +x build.sh

      - name: Build GCC Toolchain
        run: |
          echo "--- Building GCC for ${{ matrix.arch }} / ${{ matrix.target_triple }} ---"
          bash build.sh -a "${{ matrix.arch }}"

      - name: Strip binaries
        run: |
          echo "--- Stripping binaries ---"
          bash strip.sh "gcc-${{ matrix.arch }}/"

      - name: Package artifact
        run: |
          echo "--- Packaging artifact ---"
          source build.sh -a "${{ matrix.arch }}" >/dev/null 2>&1 || true
          # We manually execute the packaging function that's inside build.sh
          # Note: build.sh is sourced above to load the function and variables, but it doesn't run the build tasks because of flags handling. Wait, no, sourcing build.sh will run it.
          # We'll just define the tar command here.
          GCC_HASH_SHORT=$(git -C gcc-src rev-parse --short HEAD || echo "unknown")
          BINUTILS_HASH_SHORT=$(git -C binutils-src rev-parse --short HEAD || echo "unknown")
          DATE_STR=$(date +%Y.%m.%d)
          ARTIFACT_NAME="toolchain-${{ matrix.arch }}-${DATE_STR}-gcc${GCC_HASH_SHORT}-binutils${BINUTILS_HASH_SHORT}.tar.zst"
          env XZ_OPT="-T0 -9" tar --zstd -cJf "${ARTIFACT_NAME}" -C "./" "gcc-${{ matrix.arch }}/"
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gcc-${{ matrix.arch }}-${{ github.sha }}
          path: "*.tar.zst"
          retention-days: 30
