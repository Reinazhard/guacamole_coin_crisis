name: Build Toolchain

on:
  push:
    branches:
      - '**'
    tags:
      - '**'
  pull_request:
    branches:
      - '**'
  schedule:
    - cron: '0 0 * * 0' # Matches the schedule pipeline trigger
  workflow_dispatch:

env:
  BINUTILS_BRANCH: "binutils-2_46-branch"
  GCC_BRANCH: "releases/gcc-15"

jobs:
  build-toolchain:
    name: Build ${{ matrix.arch }} (${{ matrix.target_triple }})
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    timeout-minutes: 360 # 6 hours timeout
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: "arm64"
            target_triple: "aarch64-linux-gnu"
          - arch: "arm"
            target_triple: "arm-linux-gnueabihf"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # Shallow clone

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm base-devel git bison flex texinfo gawk curl tar xz file ncurses python glibc automake autoconf pkgconf gettext rsync zstd cpio kmod bc patch libtool wget gmp mpfr libmpc isl zlib gperf expat openssl
          chmod +x build.sh

      - name: Build GCC Toolchain
        run: |
          echo "--- Building GCC for ${{ matrix.arch }} / ${{ matrix.target_triple }} ---"
          bash build.sh -a "${{ matrix.arch }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gcc-${{ matrix.arch }}-${{ github.sha }}
          path: "*.tar.zst"
          retention-days: 30
