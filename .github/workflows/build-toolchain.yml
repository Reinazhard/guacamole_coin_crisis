name: Build Toolchain

on:
  push:
  pull_request:
  schedule:
    - cron: '0 0 1 * *' # Matches the schedule pipeline trigger
  workflow_dispatch:

jobs:
  build-toolchain:
    name: Build ${{ matrix.arch }} (${{ matrix.target_triple }})
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: archlinux:base-devel
    timeout-minutes: 360 # 6 hours timeout
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: "arm64"
            target_triple: "aarch64-linux-gnu"
          - arch: "arm"
            target_triple: "arm-linux-gnueabihf"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # Shallow clone

      - name: Cache sources
        uses: actions/cache@v4
        with:
          path: |
            gcc-src
            binutils-src
            mold-src
            sources/
          key: sources-${{ github.event_name == 'schedule' && github.run_id || hashFiles('.version-pins') }}

      - name: Cache PGO profiles
        uses: actions/cache@v4
        with:
          path: pgo-profiles
          key: pgo-${{ matrix.arch }}-${{ github.event_name == 'schedule' && github.run_id || hashFiles('.version-pins') }}

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm base-devel git curl tar xz ncurses python rsync zstd cpio kmod bc wget gmp mpfr libmpc isl zlib gperf expat openssl mold ccache cmake

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ matrix.arch }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ matrix.arch }}-

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=2G
          ccache --set-config=compression=true
          echo "/usr/lib/ccache/bin" >> $GITHUB_PATH

      - name: Cache build stages
        uses: actions/cache@v4
        with:
          path: |
            gcc-${{ matrix.arch }}
            .stamp_*
            build-binutils
            build-glibc
            build-gcc-pass1
          key: build-${{ matrix.arch }}-${{ github.event_name == 'schedule' && github.run_id || hashFiles('.version-pins', 'build.sh', '.github/workflows/build-toolchain.yml') }}
          restore-keys: |
            ${{ github.event_name != 'schedule' && format('build-{0}-', matrix.arch) || '' }}

      - name: Download & Extract Sources
        run: bash build.sh -a "${{ matrix.arch }}" download_resources

      - name: Build Stage 1 (Binutils)
        run: bash build.sh -a "${{ matrix.arch }}" build_binutils

      - name: Build Stage 2 (Linux Headers)
        run: bash build.sh -a "${{ matrix.arch }}" build_linux_headers

      - name: Build Stage 3 (GCC Pass 1)
        run: bash build.sh -a "${{ matrix.arch }}" build_gcc_pass1

      - name: Build Stage 4 (Glibc)
        run: bash build.sh -a "${{ matrix.arch }}" build_glibc

      - name: Build Stage 5 (GCC Pass 2)
        run: bash build.sh -a "${{ matrix.arch }}" build_gcc_pass2

      - name: Build Stage 6 (Mold Linker)
        run: bash build.sh -a "${{ matrix.arch }}" install_mold

      - name: Print Summary
        run: |
          bash build.sh -a "${{ matrix.arch }}" print_summary | tee summary_raw.txt
          echo '```text' > release_notes.txt
          sed 's/\x1b\[[0-9;]*m//g' summary_raw.txt >> release_notes.txt
          echo '```' >> release_notes.txt

      - name: Strip binaries
        run: |
          echo "--- Stripping binaries ---"
          bash strip.sh "gcc-${{ matrix.arch }}/"

      - name: Print ccache stats
        run: ccache --show-stats

      - name: Package artifact
        id: package
        run: |
          echo "--- Packaging artifact ---"
          GCC_HASH_SHORT=$(git -C gcc-src rev-parse --short HEAD || echo "unknown")
          BINUTILS_HASH_SHORT=$(git -C binutils-src rev-parse --short HEAD || echo "unknown")
          DATE_STR=$(date +%Y.%m.%d)-${GITHUB_RUN_ID}
          ARTIFACT_NAME="toolchain-${{ matrix.arch }}-${DATE_STR}-gcc${GCC_HASH_SHORT}-binutils${BINUTILS_HASH_SHORT}"
          echo "artifact_name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${DATE_STR}" >> "$GITHUB_OUTPUT"
          tar --zstd -cf "${ARTIFACT_NAME}.tar.zst" -C "./" "gcc-${{ matrix.arch }}/"
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: "*.tar.zst"
          retention-days: 30

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event_name != 'pull_request'
        with:
          tag_name: ${{ steps.package.outputs.tag_name }}
          name: Toolchain Release ${{ steps.package.outputs.tag_name }}
          body_path: ${{ matrix.arch == 'arm64' && 'release_notes.txt' || '' }}
          append_body: ${{ matrix.arch != 'arm64' }}
          files: "*.tar.zst"

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.arch }}
          path: "build-*.log"
          retention-days: 7
