name: Build Toolchain

on:
  push:
  pull_request:
  schedule:
    - cron: '0 0 1 * *' # Matches the schedule pipeline trigger
  workflow_dispatch:

jobs:
  build-toolchain:
    name: Build ${{ matrix.arch }} (${{ matrix.target_triple }})
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    timeout-minutes: 600 # 10 hours timeout
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: "arm64"
            target_triple: "aarch64-linux-gnu"
          - arch: "arm"
            target_triple: "arm-linux-gnueabihf"
    outputs:
      tag_name: ${{ steps.package.outputs.tag_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1 # Shallow clone

      - name: Configure Pacman parallel downloads
        run: |
          echo "--- Configuring Pacman parallel downloads ---"
          sed -i 's/^#ParallelDownloads = 5/ParallelDownloads = 10/' /etc/pacman.conf

      - name: Install dependencies
        run: |
          pacman -Syu --needed --noconfirm base-devel git curl tar xz ncurses python rsync zstd cpio kmod bc wget gmp mpfr libmpc isl zlib gperf expat openssl mold cmake

      - name: Download & Extract Sources
        run: bash build.sh -a "${{ matrix.arch }}" download_resources

      - name: Build Stage 1 (Binutils)
        run: bash build.sh -a "${{ matrix.arch }}" build_binutils

      - name: Build Stage 2 (Linux Headers)
        run: bash build.sh -a "${{ matrix.arch }}" build_linux_headers

      - name: Build Stage 3 (GCC Pass 1)
        run: bash build.sh -a "${{ matrix.arch }}" build_gcc_pass1

      - name: Build Stage 4 (Glibc)
        run: bash build.sh -a "${{ matrix.arch }}" build_glibc

      - name: Build Stage 5 (GCC Pass 2)
        run: bash build.sh -a "${{ matrix.arch }}" build_gcc_pass2

      - name: Build Stage 6 (Mold Linker)
        run: bash build.sh -a "${{ matrix.arch }}" install_mold

      - name: Build Stage 7 (Strip Binaries)
        run: bash build.sh -a "${{ matrix.arch }}" strip_binaries

      - name: Build Stage 8 (ELF Validation)
        run: bash build.sh -a "${{ matrix.arch }}" validate_elf

      - name: Print Summary
        run: |
          bash build.sh -a "${{ matrix.arch }}" print_summary | tee summary_raw.txt
          echo '```text' > release_notes.txt
          sed 's/\x1b\[[0-9;]*m//g' summary_raw.txt >> release_notes.txt
          echo '```' >> release_notes.txt

      - name: Package artifact
        id: package
        run: |
          echo "--- Packaging artifact ---"
          GCC_HASH_SHORT=$(git -C gcc-src rev-parse --short HEAD || echo "unknown")
          BINUTILS_HASH_SHORT=$(git -C binutils-src rev-parse --short HEAD || echo "unknown")
          DATE_STR=$(date +%Y.%m.%d)-${GITHUB_RUN_ID}
          ARTIFACT_NAME="toolchain-${{ matrix.arch }}-${DATE_STR}-gcc${GCC_HASH_SHORT}-binutils${BINUTILS_HASH_SHORT}"
          echo "artifact_name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${DATE_STR}" >> "$GITHUB_OUTPUT"
          tar -I "zstd -T0" -cf "${ARTIFACT_NAME}.tar.zst" -C "./" "gcc-${{ matrix.arch }}/"

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: |
            *.tar.zst
            release_notes.txt
          retention-days: 30

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-logs-${{ matrix.arch }}
          # Note: All stages and commands run via run_log() produce log files
          # matching ${WORK_DIR}/build-${stage_name}.log. Thus, the "build-*.log"
          # glob perfectly covers all of them (including binutils, pass1, glibc,
          # pass2, mold, and PGO training logs).
          path: "build-*.log"
          retention-days: 7

  publish-release:
    name: Publish GitHub Release
    needs: build-toolchain
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts

      - name: Prepare release notes and assets
        run: |
          cp artifacts/toolchain-arm64-*/release_notes.txt ./release_notes.txt
          mkdir assets
          cp artifacts/toolchain-arm64-*/*.tar.zst assets/
          cp artifacts/toolchain-arm-*/*.tar.zst assets/

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.build-toolchain.outputs.tag_name }}
          name: Toolchain Release ${{ needs.build-toolchain.outputs.tag_name }}
          body_path: ./release_notes.txt
          files: assets/*.tar.zst
