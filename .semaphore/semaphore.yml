version: v1.0
name: GCC Toolchain — Optimized (arm64 + arm)
agent:
  machine:
    type: f1-standard-2
    os_image: ubuntu2404
  containers:
    - name: main
      image: buildpack-deps:26.04-scm
fail_fast:
  stop:
    when: 'true'
auto_cancel:
  running:
    when: 'true'
global_job_config:
  env_vars:
    - name: BINUTILS_BRANCH
      value: binutils-2_46
    - name: GCC_BRANCH
      value: releases/gcc-15
    - name: DEBIAN_FRONTEND
      value: noninteractive
blocks:
  - name: Build Toolchains
    task:
      jobs:
        - name: Build and Publish (arm64 + arm)
          commands:
            - checkout
            - apt-get update -qq
            - apt-get install -y --no-install-recommends build-essential bison flex texinfo gawk libgmp-dev libmpfr-dev libmpc-dev libisl-dev zlib1g-dev git xz-utils ca-certificates
            - chmod +x build.sh strip.sh
            
            - echo "--- Building GCC for arm64 / aarch64-linux-gnu ---"
            - bash build.sh -a "arm64"
            - bash strip.sh "gcc-arm64/"
            - env XZ_OPT="-T0 -9" tar -cJf "gcc-arm64-aarch64-linux-gnu.tar.xz" "gcc-arm64/"
            
            - echo "--- Building GCC for arm / arm-linux-gnueabi ---"
            - bash build.sh -a "arm"
            - bash strip.sh "gcc-arm/"
            - env XZ_OPT="-T0 -9" tar -cJf "gcc-arm-arm-linux-gnueabi.tar.xz" "gcc-arm/"
            
            - echo "--- Publishing to Project Releases ---"
            - artifact push project gcc-arm64-aarch64-linux-gnu.tar.xz --destination "releases/${SEMAPHORE_GIT_TAG_NAME:-${SEMAPHORE_GIT_SHA:0:8}}/gcc-arm64-aarch64-linux-gnu.tar.xz"
            - artifact push project gcc-arm-arm-linux-gnueabi.tar.xz --destination "releases/${SEMAPHORE_GIT_TAG_NAME:-${SEMAPHORE_GIT_SHA:0:8}}/gcc-arm-arm-linux-gnueabi.tar.xz"
