version: v1.0
name: GCC Toolchain — Tensor G1 (arm64 + arm)
agent:
  machine:
    type: f1-standard-2
    os_image: ubuntu2404
  containers:
    - name: main
      image: buildpack-deps:bookworm-scm
fail_fast:
  stop:
    when: 'true'
auto_cancel:
  running:
    when: 'true'
global_job_config:
  env_vars:
    - name: BINUTILS_BRANCH
      value: binutils-2_46
    - name: GCC_BRANCH
      value: releases/gcc-15
    - name: DEBIAN_FRONTEND
      value: noninteractive
blocks:
  - name: Install Dependencies
    dependencies: []
    task:
      jobs:
        - name: apt-get
          commands:
            - checkout
            - apt-get update -qq && apt-get upgrade -y
            - apt-get update -qq && apt-get install -y --no-install-recommends build-essential gcc g++ bison flex texinfo gawk libgmp-dev libmpfr-dev libmpc-dev libisl-dev zlib1g-dev git xz-utils ca-certificates
            - cache store apt-gcc-deps-$(date +%Y-%m) /var/cache/apt/archives
  - name: Build arm64 Toolchain
    dependencies:
      - Install Dependencies
    task:
      prologue:
        commands:
          - checkout
          - cache restore apt-gcc-deps-$(date +%Y-%m)
          - apt-get update -qq && apt-get install -y --no-install-recommends build-essential gcc g++ bison flex texinfo gawk libgmp-dev libmpfr-dev libmpc-dev libisl-dev zlib1g-dev git xz-utils ca-certificates
          - chmod +x build.sh
      jobs:
        - name: arm64 (aarch64-linux-gnu)
          env_vars:
            - name: ARCH
              value: arm64
            - name: TARGET_TRIPLE
              value: aarch64-linux-gnu
            - name: ARTIFACT_NAME
              value: gcc-arm64-aarch64-linux-gnu
          commands:
            - 'echo "--- Building GCC for ${ARCH} / ${TARGET_TRIPLE} ---"'
            - 'bash build.sh -a "${ARCH}"'
            - echo "--- Stripping binaries to reduce size ---"
            - 'bash strip.sh "gcc-${ARCH}/"'
            - echo "--- Packaging artifact ---"
            - 'env XZ_OPT="-T0 -9" tar -cJf "${ARTIFACT_NAME}.tar.xz" "gcc-${ARCH}/"'
            - 'ls -lh "${ARTIFACT_NAME}.tar.xz"'
            - 'artifact push workflow "${ARTIFACT_NAME}.tar.xz" --destination "toolchains/${ARTIFACT_NAME}.tar.xz"'
  - name: Build arm Toolchain
    dependencies:
      - Build arm64 Toolchain
    task:
      prologue:
        commands:
          - checkout
          - cache restore apt-gcc-deps-$(date +%Y-%m)
          - apt-get update -qq && apt-get install -y --no-install-recommends build-essential gcc g++ bison flex texinfo gawk libgmp-dev libmpfr-dev libmpc-dev libisl-dev zlib1g-dev git xz-utils ca-certificates
          - chmod +x build.sh
      jobs:
        - name: arm (arm-linux-gnueabi)
          env_vars:
            - name: ARCH
              value: arm
            - name: TARGET_TRIPLE
              value: arm-linux-gnueabi
            - name: ARTIFACT_NAME
              value: gcc-arm-arm-linux-gnueabi
          commands:
            - 'echo "--- Building GCC for ${ARCH} / ${TARGET_TRIPLE} ---"'
            - 'bash build.sh -a "${ARCH}"'
            - echo "--- Stripping binaries to reduce size ---"
            - 'bash strip.sh "gcc-${ARCH}/"'
            - echo "--- Packaging artifact ---"
            - 'env XZ_OPT="-T0 -9" tar -cJf "${ARTIFACT_NAME}.tar.xz" "gcc-${ARCH}/"'
            - 'ls -lh "${ARTIFACT_NAME}.tar.xz"'
            - 'artifact push workflow "${ARTIFACT_NAME}.tar.xz" --destination "toolchains/${ARTIFACT_NAME}.tar.xz"'
  - name: Publish Artifacts
    dependencies:
      - Build arm Toolchain
    task:
      jobs:
        - name: Promote to project store
          commands:
            - artifact pull workflow toolchains/gcc-arm64-aarch64-linux-gnu.tar.xz
            - artifact pull workflow toolchains/gcc-arm-arm-linux-gnueabi.tar.xz
            - 'artifact push project gcc-arm64-aarch64-linux-gnu.tar.xz --destination "releases/${SEMAPHORE_GIT_TAG_NAME:-${SEMAPHORE_GIT_SHA:0:8}}/gcc-arm64-aarch64-linux-gnu.tar.xz"'
            - 'artifact push project gcc-arm-arm-linux-gnueabi.tar.xz --destination "releases/${SEMAPHORE_GIT_TAG_NAME:-${SEMAPHORE_GIT_SHA:0:8}}/gcc-arm-arm-linux-gnueabi.tar.xz"'
            - echo ""
            - 'echo "Artifacts published under releases/${SEMAPHORE_GIT_TAG_NAME:-${SEMAPHORE_GIT_SHA:0:8}}/"'
            - echo "  gcc-arm64-aarch64-linux-gnu.tar.xz"
            - echo "  gcc-arm-arm-linux-gnueabi.tar.xz"
